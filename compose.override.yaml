---
# Development environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-dev
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      #- /app/vendor
    environment:
      FRANKENPHP_WORKER_CONFIG: watch
      FRANKENPHP_SITE_CONFIG: hot_reload
      MERCURE_EXTRA_DIRECTIVES: demo
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-develop}"
      APP_ENV: "${APP_ENV:-dev}"
      ###> druidfi/symfony-docker-traefik ###
      SERVER_NAME: :80
      ###< druidfi/symfony-docker-traefik ###
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###
###> druidfi/symfony-docker-traefik ###
    ports: !reset []
    labels:
      traefik.enable: "true"
      traefik.http.routers.symfony-docker-traefik.entrypoints: https
      traefik.http.routers.symfony-docker-traefik.rule: Host(`symfony-docker-traefik.docker.so`)
      traefik.http.routers.symfony-docker-traefik.tls: "true"
      #traefik.http.services.symfony-docker-traefik.loadbalancer.server.port: 80
      traefik.docker.network: traefik-network
    networks:
      - traefik-network
      - default

networks:
  traefik-network:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-network}
###< druidfi/symfony-docker-traefik ###
